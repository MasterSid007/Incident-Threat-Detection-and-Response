services:
  itdr-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    # Optional full-pipeline mounts after downloading/training local artifacts:
    # volumes:
    #   - ./rba-dataset.csv:/app/rba-dataset.csv:ro
    #   - ./saved_models:/app/saved_models:ro
